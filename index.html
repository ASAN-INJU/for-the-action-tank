<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V11.2.9 단타 분석 앱</title>

<style>
*{
 box-sizing:border-box;
}

body{
 margin:0;
 font-family:Arial,sans-serif;
 background:#f4f6f9;
 padding-bottom:70px;
}

header{
 background:#111827;
 color:white;
 padding:20px;
 font-size:22px;
 font-weight:bold;
}

.market{
 margin:15px;
 padding:15px;
 background:white;
 border-radius:15px;
}

.card{
 margin:15px;
 padding:18px;
 background:white;
 border-radius:18px;
 box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.rank{
 font-size:18px;
 font-weight:bold;
}

.name{
 font-size:26px;
 font-weight:bold;
 margin:10px 0;
}

.score{
 font-size:38px;
 font-weight:bold;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-top:15px;
}

.signal{
 margin-top:15px;
 line-height:1.8;
}

button{
 padding:12px 15px;
 border:0;
 border-radius:10px;
 margin-top:15px;
 margin-right:5px;
}

.detail{
 background:#2563eb;
 color:white;
}

.save{
 background:#eee;
}

nav{
 position:fixed;
 bottom:0;
 width:100%;
 background:white;
 border-top:1px solid #ddd;
 padding:15px;
 display:flex;
 justify-content:space-around;
}

</style>

</head>


<body>


<header>
🔥 오늘의 단타 추천
</header>


<div class="market">
📊 시장 상태 : 상승 관심<br>
⚡ 분석 기준 : 이동평균 + 뉴스 + 거래량
</div>


<div id="stocks"></div>


<nav>
🔥추천
📊분석
⭐관심
⚙설정
</nav>



<script>

const stocks=[

{
name:"삼성전자",
score:92,
trend:95,
news:90,
volume:91,
risk:"보통"
},

{
name:"SK하이닉스",
score:88,
trend:92,
news:85,
volume:89,
risk:"낮음"
},

{
name:"현대차",
score:84,
trend:87,
news:82,
volume:85,
risk:"보통"
}

];



let html="";


stocks.forEach((s,index)=>{


html+=`

<div class="card">

<div class="rank">
🥇 추천 ${index+1}위
</div>


<div class="name">
${s.name}
</div>


<div class="score">
⭐ ${s.score}점
</div>


<div class="info">
<span>📈${s.trend}</span>
<span>📰${s.news}</span>
<span>📊${s.volume}</span>
</div>


<div class="signal">

🟢 신호 : 관심<br>
⚠ 위험도 : ${s.risk}

</div>


<button class="detail"
onclick="alert('${s.name} 상세 분석 준비')">
상세분석
</button>


<button class="save"
onclick="save('${s.name}')">
☆관심
</button>


</div>

`;

});


document.getElementById("stocks").innerHTML=html;



function save(name){

let list=
JSON.parse(localStorage.getItem("favorite")||"[]");


list.push(name);


localStorage.setItem(
"favorite",
JSON.stringify(list)
);


alert(name+" 관심 저장 완료");

}


</script>


</body>
</html>
