<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi Ultimate V11.0</title>

<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Arial,"Noto Sans KR",sans-serif;
 background:#f5f7fb;
 color:#222;
}
header{
 background:#123b7a;
 color:white;
 padding:20px;
 text-align:center;
 font-size:22px;
 font-weight:bold;
}
.container{
 padding:15px;
}
.card{
 background:white;
 border-radius:15px;
 padding:15px;
 margin-bottom:15px;
 box-shadow:0 3px 8px #ddd;
}
.market{
 display:flex;
 gap:10px;
}
.market div{
 flex:1;
 text-align:center;
}
.up{color:red}
.down{color:blue}

.stock{
 display:flex;
 justify-content:space-between;
 padding:12px;
 border-bottom:1px solid #eee;
 cursor:pointer;
}
.score{
 background:#16a34a;
 color:white;
 padding:5px 10px;
 border-radius:20px;
}

button{
 width:100%;
 padding:15px;
 border:0;
 border-radius:10px;
 background:#123b7a;
 color:white;
 font-size:16px;
}

#detail{
 display:none;
}

nav{
 position:fixed;
 bottom:0;
 left:0;
 right:0;
 background:white;
 display:flex;
 justify-content:space-around;
 padding:12px;
 border-top:1px solid #ddd;
}
</style>
</head>

<body>

<header>
📈 Hi Ultimate V11.0
<br>
AI 주식 도우미
</header>

<div class="container">

<div class="card market">
<div>
📈 코스피<br>
<b>2985.41</b><br>
<span class="up">▲0.83%</span>
</div>

<div>
📊 코스닥<br>
<b>812.55</b><br>
<span class="down">▼0.15%</span>
</div>
</div>


<div id="home">

<div class="card">
<h3>🔥 AI 추천 종목</h3>

<div class="stock" onclick="show('삼성전자',92)">
삼성전자
<span class="score">92점</span>
</div>

<div class="stock" onclick="show('SK하이닉스',89)">
SK하이닉스
<span class="score">89점</span>
</div>

<div class="stock" onclick="show('두산에너빌리티',95)">
두산에너빌리티
<span class="score">95점</span>
</div>

<div class="stock" onclick="show('한화에어로스페이스',91)">
한화에어로스페이스
<span class="score">91점</span>
</div>

<div class="stock" onclick="show('알테오젠',88)">
알테오젠
<span class="score">88점</span>
</div>

</div>


<div class="card">
<h3>📰 오늘 뉴스</h3>
<p>• AI 반도체 성장 기대</p>
<p>• 외국인 순매수 확대</p>
<p>• 기관 관심 증가</p>
</div>

</div>


<div id="detail" class="card">

<h2 id="name"></h2>

<h3>
AI 점수 :
<span id="score"></span>점
</h3>

<hr>

<p>📈 이동평균선 : 양호</p>
<p>📊 거래량 : 증가</p>
<p>🌎 외국인 : 매수</p>
<p>🏦 기관 : 매수</p>
<p>📰 뉴스 : 호재</p>

<br>

<button onclick="back()">목록으로</button>

</div>


</div>


<nav>
🏠 홈
⭐ 관심
🔔 알림
📰 뉴스
⚙ 설정
</nav>


<script>

function show(n,s){
 document.getElementById("home").style.display="none";
 document.getElementById("detail").style.display="block";

 document.getElementById("name").innerHTML=n;
 document.getElementById("score").innerHTML=s;
}

function back(){
 document.getElementById("home").style.display="block";
 document.getElementById("detail").style.display="none";
}

</script>

</body>
</html>
