<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#101828"><link rel="manifest" href="./manifest.json"><title>Hi Ultimate Mobile V5</title><style>
body{margin:0;background:#f3f5f8;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif;color:#17202a}header{position:sticky;top:0;background:linear-gradient(135deg,#101828,#243b55);color:#fff;padding:15px}header h1{margin:0}main{max-width:1080px;margin:auto;padding:12px 12px 90px}.panel,.featured,.news{background:#fff;border:1px solid #d9e1e8;border-radius:16px;padding:13px;margin-bottom:11px}.featured{background:linear-gradient(135deg,#101828,#284869);color:#fff}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.tabs{display:flex;gap:6px;overflow:auto;margin-top:8px}.tabs button{white-space:nowrap;background:#eef3f8;color:#24415f}.tabs button.active{background:#101828;color:#fff}.grid,.linked{display:grid;grid-template-columns:1fr;gap:7px;margin-top:9px}.item,.stock{border:1px solid #d9e1e8;border-radius:13px;padding:10px;background:#fbfcfe}.rank{font-size:20px;font-weight:900;color:#2563eb;min-width:30px}.badge{display:inline-block;padding:5px 7px;border-radius:999px;font-size:10px;font-weight:850}.strong{background:#e6f6ed;color:#15803d}.interest{background:#e8f0ff;color:#2356a8}.wait{background:#fff2d8;color:#b26a00}.risk{background:#fdeaea;color:#c62828}.leader{background:#eee8ff;color:#6d4cc2}.kr{background:#e8f0ff;color:#2356a8}.us{background:#ffecef;color:#a33b4b}.muted{font-size:10px;color:#667085}.price{text-align:right;font-size:16px;font-weight:900}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:7px}.metric{background:#f7f9fc;border-radius:9px;padding:7px;text-align:center}.metric b{display:block;font-size:11px}.metric span{font-size:8px;color:#667085}.hero-name{font-size:25px;font-weight:900}.hero-score{font-size:31px;font-weight:900;text-align:right}.reason-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.reason{background:#ffffff18;border:1px solid #ffffff30;padding:6px 8px;border-radius:999px;font-size:10px}button{border:0;border-radius:10px;padding:9px 11px;font-weight:800;background:#2563eb;color:#fff}nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #d9e1e8;display:grid;grid-template-columns:repeat(3,1fr)}nav button{border-radius:0;background:#fff;color:#5d6b79;font-size:10px;padding:10px 2px}nav button.active{color:#2563eb;background:#f5f8ff}.hidden{display:none!important}@media(min-width:760px){.grid,.linked{grid-template-columns:1fr 1fr}}
</style></head><body><header><h1>Hi Ultimate Mobile V5</h1><p>한국·미국 뉴스 · TOP10 · 대장주 · 현재가 · 점수</p></header><main>
<section id="home"><div id="featured" class="featured">데이터를 불러오는 중…</div><div class="panel"><div class="row"><div><b>오늘의 AI TOP 10</b><div id="updated" class="muted"></div></div><button onclick="loadData()">새로고침</button></div><div class="tabs"><button class="active" onclick="setMarket('ALL',this)">통합</button><button onclick="setMarket('KR',this)">한국</button><button onclick="setMarket('US',this)">미국</button></div><div id="top10" class="grid"></div></div></section>
<section id="news" class="hidden"><div class="panel"><div class="row"><b>최신 뉴스와 관련주</b><div class="tabs"><button class="active" onclick="setNews('ALL',this)">전체</button><button onclick="setNews('KR',this)">한국</button><button onclick="setNews('US',this)">미국</button></div></div></div><div id="newsList"></div></section>
<section id="settings" class="hidden"><div class="panel"><b>앱 설치</b><p class="muted">휴대폰 크롬 메뉴에서 ‘홈 화면에 추가’를 선택하세요.</p><button style="width:100%" onclick="installApp()">홈 화면에 설치</button></div><div class="panel"><b>데이터 상태</b><div id="status" class="muted"></div></div></section>
</main><nav><button class="active" onclick="showPage('home',this)">🏠<br>홈</button><button onclick="showPage('news',this)">📰<br>뉴스</button><button onclick="showPage('settings',this)">⚙️<br>설정</button></nav>
<script>
let DATA=null,market='ALL',newsMarket='ALL',deferredPrompt=null;const fmt=(v,c)=>c==='USD'?'$'+Number(v||0).toFixed(2):Number(v||0).toLocaleString()+'원';const B=s=>s>=90?['강력 관심','strong']:s>=80?['관심','interest']:s>=70?['관망','wait']:['주의','risk'];
function showPage(id,b){document.querySelectorAll('main>section').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function card(s,i){const b=B(s.score);return `<div class="item"><div class="row"><div class="row"><div class="rank">${i||''}</div><div><b>${s.name} ${s.leader?'<span class="badge leader">대장주</span>':''}</b><div class="muted">${s.code} · ${s.theme} · <span class="badge ${s.market==='KR'?'kr':'us'}">${s.market==='KR'?'한국':'미국'}</span></div></div></div><div class="price">${fmt(s.price,s.currency)}<br><span class="badge ${b[1]}">${b[0]} ${s.score}점</span></div></div><div class="metrics"><div class="metric"><b>${Number(s.change||0).toFixed(2)}%</b><span>등락률</span></div><div class="metric"><b>${Number(s.trend||0).toFixed(2)}%</b><span>5일 추세</span></div><div class="metric"><b>${Number(s.volume||0).toLocaleString()}</b><span>거래량</span></div><div class="metric"><b>${s.newsScore||0}</b><span>뉴스강도</span></div></div></div>`}
function renderFeatured(){const s=DATA.featured;if(!s)return featured.textContent='표시할 종목이 없습니다.';featured.innerHTML=`<div class="row"><div><div style="font-size:10px;opacity:.8">오늘의 AI 1순위 관심종목</div><div class="hero-name">${s.name}</div><div>${s.code} · ${s.theme}</div></div><div><div class="hero-score">${s.score}점</div><div>${fmt(s.price,s.currency)}</div></div></div><div class="reason-list">${(s.reasons||[]).map(r=>`<span class="reason">${r}</span>`).join('')}</div>`}
function renderTop(){const a=market==='KR'?DATA.topKR:market==='US'?DATA.topUS:DATA.topAll;top10.innerHTML=a.map((s,i)=>card(s,i+1)).join('')}
function renderNews(){const a=DATA.news.filter(n=>newsMarket==='ALL'||n.market===newsMarket);newsList.innerHTML=a.map(n=>`<article class="news"><div class="row"><div><span class="badge ${n.market==='KR'?'kr':'us'}">${n.market==='KR'?'한국':'미국'}</span> <span class="badge interest">${n.theme}</span></div><span class="badge ${n.newsScore>=65?'strong':n.newsScore>=50?'wait':'risk'}">뉴스강도 ${n.newsScore}</span></div><h3><a href="${n.link}" target="_blank" style="color:#17202a;text-decoration:none">${n.title}</a></h3><div class="muted">${n.source} · ${n.published}</div><div class="linked">${(n.stocks||[]).map((s,i)=>`<div class="stock"><div class="row"><div><b>${s.name} ${i===0?'<span class="badge leader">대장주</span>':''}</b><div class="muted">${s.code}</div></div><div class="price">${fmt(s.price,s.currency)}<br><span class="badge ${B(s.score)[1]}">${s.score}점</span></div></div></div>`).join('')}</div></article>`).join('')}
function setMarket(m,b){market=m;b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderTop()}function setNews(m,b){newsMarket=m;b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderNews()}
async function loadData(){try{DATA=await (await fetch('./data/data.json?'+Date.now())).json();updated.textContent='마지막 갱신: '+DATA.updatedAt;status.textContent='데이터 정상 · '+DATA.updatedAt;renderFeatured();renderTop();renderNews()}catch(e){featured.textContent='데이터를 불러오지 못했습니다.';status.textContent='data/data.json 확인 필요'}}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e});async function installApp(){if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null}else alert('크롬 메뉴에서 홈 화면에 추가를 선택하세요.')}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');loadData();
</script></body></html>
