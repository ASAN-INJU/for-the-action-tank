<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hi Ultimate Lite V4</title>
<style>
:root{--bg:#f3f5f8;--card:#fff;--line:#d9e1e8;--navy:#101828;--blue:#2563eb;--green:#15803d;--red:#c62828;--amber:#b26a00;--purple:#6d4cc2;--muted:#667085}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif;color:#17202a}
header{background:linear-gradient(135deg,#101828,#243b55);color:#fff;padding:16px;position:sticky;top:0;z-index:20}
header h1{margin:0;font-size:25px}header p{margin:4px 0 0;font-size:12px;opacity:.86}
main{max-width:1120px;margin:auto;padding:13px}
.panel,.news,.featured{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 5px 18px #1f29370b}
.featured{background:linear-gradient(135deg,#101828,#284869);color:#fff}
.row{display:flex;justify-content:space-between;gap:10px;align-items:center}
.hero-name{font-size:27px;font-weight:900}.hero-score{font-size:34px;font-weight:900;text-align:right}
.hero-price{font-size:20px;font-weight:800}.reason-list{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.reason{background:#ffffff18;border:1px solid #ffffff30;padding:7px 9px;border-radius:999px;font-size:11px}
.tabs{display:flex;gap:7px;overflow:auto;margin-top:10px}.tabs button{white-space:nowrap;background:#eef3f8;color:#24415f}.tabs button.active{background:#101828;color:#fff}
.topgrid,.linked,.urgent-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.item,.stock{border:1px solid var(--line);border-radius:13px;padding:11px;background:#fbfcfe}
.rank{font-size:20px;font-weight:900;color:var(--blue);min-width:32px}
.badge{display:inline-block;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:850}
.strong{background:#e6f6ed;color:var(--green)}.interest{background:#e8f0ff;color:#2356a8}.wait{background:#fff2d8;color:var(--amber)}.risk{background:#fdeaea;color:var(--red)}.leader{background:#eee8ff;color:var(--purple)}.kr{background:#e8f0ff;color:#2356a8}.us{background:#ffecef;color:#a33b4b}
.muted{font-size:11px;color:var(--muted)}.price{text-align:right;font-size:17px;font-weight:900}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}.metric{background:#f7f9fc;border-radius:10px;padding:8px;text-align:center}.metric b{display:block;font-size:12px}.metric span{font-size:9px;color:var(--muted)}
.news h3{font-size:16px;line-height:1.45}.urgent{border-left:5px solid var(--red)}
button{border:0;border-radius:10px;padding:9px 12px;font-weight:800;background:var(--blue);color:#fff;cursor:pointer}
@media(min-width:760px){.topgrid,.linked,.urgent-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header><h1>Hi Ultimate Lite V4</h1><p>오늘의 AI 1순위 · 한국·미국 TOP 10 · 긴급 뉴스 · 관련주 · 대장주</p></header>
<main>
<div id="featured" class="featured">오늘의 AI 1순위를 계산하는 중입니다…</div>

<div class="panel">
  <div class="row"><div><b>오늘의 AI TOP 10</b><div id="updated" class="muted"></div></div><button onclick="loadData()">새로고침</button></div>
  <div class="tabs">
    <button class="active" onclick="setMarket('ALL',this)">통합 TOP 10</button>
    <button onclick="setMarket('KR',this)">한국 TOP 10</button>
    <button onclick="setMarket('US',this)">미국 TOP 10</button>
  </div>
  <div id="top10" class="topgrid"></div>
</div>

<div class="panel">
  <b>긴급 뉴스</b>
  <div id="urgentList" class="urgent-grid"></div>
</div>

<div class="panel">
  <div class="row"><b>최신 뉴스와 관련주</b>
    <div class="tabs">
      <button class="active" onclick="setNews('ALL',this)">전체</button>
      <button onclick="setNews('KR',this)">한국</button>
      <button onclick="setNews('US',this)">미국</button>
    </div>
  </div>
  <div id="newsList"></div>
</div>

<script>
let DATA=null,market='ALL',newsMarket='ALL';
const fmt=(v,c)=>c==="USD"?"$"+Number(v||0).toFixed(2):Number(v||0).toLocaleString()+"원";
const badge=s=>s>=90?["강력 관심","strong"]:s>=80?["관심","interest"]:s>=70?["관망","wait"]:["주의","risk"];

function stockCard(s,i){
 const b=badge(s.score);
 return `<div class="item"><div class="row"><div class="row" style="justify-content:flex-start"><div class="rank">${i||""}</div><div><b>${s.name} ${s.leader?'<span class="badge leader">대장주</span>':''}</b><div class="muted">${s.code} · ${s.theme} · <span class="badge ${s.market==='KR'?'kr':'us'}">${s.market==='KR'?'한국':'미국'}</span></div></div></div><div class="price">${fmt(s.price,s.currency)}<br><span class="badge ${b[1]}">${b[0]} ${s.score}점</span></div></div><div class="metrics"><div class="metric"><b>${Number(s.change).toFixed(2)}%</b><span>등락률</span></div><div class="metric"><b>${Number(s.trend).toFixed(2)}%</b><span>5일 추세</span></div><div class="metric"><b>${Number(s.volume||0).toLocaleString()}</b><span>거래량</span></div><div class="metric"><b>${s.newsScore}</b><span>뉴스강도</span></div></div></div>`;
}

function renderFeatured(){
 const s=DATA.featured;
 if(!s){featured.textContent="표시할 종목이 없습니다.";return}
 featured.innerHTML=`<div class="row"><div><div class="muted" style="color:#dbe7f3">오늘의 AI 1순위 관심종목</div><div class="hero-name">${s.name}</div><div>${s.code} · ${s.theme} · ${s.market==='KR'?'한국':'미국'}</div></div><div><div class="hero-score">${s.score}점</div><div class="hero-price">${fmt(s.price,s.currency)}</div></div></div><div class="reason-list">${(s.reasons||[]).map(r=>`<span class="reason">${r}</span>`).join("")}</div><div style="margin-top:10px;font-size:11px;opacity:.8">관심 우선순위를 보여주는 참고 지표이며 매수 추천이 아닙니다.</div>`;
}
function renderTop(){
 const arr=market==='KR'?DATA.topKR:market==='US'?DATA.topUS:DATA.topAll;
 top10.innerHTML=arr.map((s,i)=>stockCard(s,i+1)).join("");
}
function renderUrgent(){
 urgentList.innerHTML=DATA.urgent.length?DATA.urgent.map(n=>`<article class="news urgent"><div class="row"><div><span class="badge ${n.market==='KR'?'kr':'us'}">${n.market==='KR'?'한국':'미국'}</span> <span class="badge interest">${n.theme}</span></div><span class="badge strong">뉴스강도 ${n.newsScore}</span></div><h3><a href="${n.link}" target="_blank" style="color:#17202a;text-decoration:none">${n.title}</a></h3><div class="muted">${n.source} · ${n.published}</div>${n.leader?`<div style="margin-top:10px"><b>대장주 ${n.leader.name}</b> · ${fmt(n.leader.price,n.leader.currency)} · ${n.leader.score}점</div>`:""}</article>`).join(""):'<div class="muted">긴급 뉴스가 없습니다.</div>';
}
function renderNews(){
 const arr=DATA.news.filter(n=>newsMarket==='ALL'||n.market===newsMarket);
 newsList.innerHTML=arr.map(n=>`<article class="news"><div class="row"><div><span class="badge ${n.market==='KR'?'kr':'us'}">${n.market==='KR'?'한국':'미국'}</span> <span class="badge interest">${n.theme}</span></div><span class="badge ${n.newsScore>=65?'strong':n.newsScore>=50?'wait':'risk'}">뉴스강도 ${n.newsScore}</span></div><h3><a href="${n.link}" target="_blank" style="color:#17202a;text-decoration:none">${n.title}</a></h3><div class="muted">${n.source} · ${n.published}</div><div class="linked">${n.stocks.map((s,i)=>`<div class="stock"><div class="row"><div><b>${s.name} ${i===0?'<span class="badge leader">대장주</span>':''}</b><div class="muted">${s.code}</div></div><div class="price">${fmt(s.price,s.currency)}<br><span class="badge ${badge(s.score)[1]}">${s.score}점</span></div></div></div>`).join("")}</div></article>`).join("");
}
function setMarket(m,btn){market=m;btn.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active'));btn.classList.add('active');renderTop()}
function setNews(m,btn){newsMarket=m;btn.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active'));btn.classList.add('active');renderNews()}
async function loadData(){
 try{
  featured.textContent="오늘의 AI 1순위를 계산하는 중입니다…";
  DATA=await (await fetch("/api/data")).json();
  updated.textContent="마지막 갱신: "+DATA.updatedAt+" · 무료 공개 시세로 지연될 수 있습니다.";
  renderFeatured();renderTop();renderUrgent();renderNews();
 }catch(e){
  featured.textContent="데이터를 불러오지 못했습니다.";
  top10.textContent="시세 조회 실패";
  newsList.textContent="뉴스 조회 실패";
 }
}
loadData();
</script>
</main>
</body>
</html>
